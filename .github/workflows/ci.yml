name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax check
        run: |
          PYTHONPYCACHEPREFIX=/tmp/skills-mgr-pycache python3 -m py_compile \
            scripts/skills-mgr \
            scripts/skills-analyzer \
            scripts/skills-remove \
            scripts/skills-doctor \
            scripts/skills-update
      - name: Shell syntax check
        run: |
          bash -n install.sh
          bash -n scripts/skills-sync
      - name: Unit and integration tests
        run: python3 -m unittest discover -s tests
